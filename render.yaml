services:
  - type: web
    name: mewar-erp-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker --timeout 120 -b 0.0.0.0:$PORT app.main:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

      # ── CORS: set to * so any frontend/client can call the API ──
      - key: CORS_ORIGINS
        value: "*"

      # ── Main ERP database (Hostinger) ────────────────────────────
      - key: DATABASE_URL
        sync: false   # set this in Render dashboard → Environment

      # ── Chatbot operational DB (entity_aliases, feedback, etc.) ──
      # Point to same Hostinger DB or a separate chatbot schema
      - key: LOCAL_DATABASE_URL
        sync: false   # set this in Render dashboard → Environment

      # ── LLM API Keys (at least one required for chatbot) ─────────
      - key: CEREBRAS_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      - key: GROQ_API_KEY_1
        sync: false

      - key: GROQ_API_KEY_2
        sync: false

      - key: DEEPSEEK_API_KEY
        sync: false

      # ── App environment ───────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
