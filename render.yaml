services:
  - type: web
    name: mewar-erp-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker --timeout 120 -b 0.0.0.0:$PORT app.main:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

      # ── CORS: allow any frontend to call the API ──
      - key: CORS_ORIGINS
        value: "*"

      # ── App environment ─────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      # ── Database (REQUIRED — set in Render dashboard) ───────────
      # Format: mysql+pymysql://USER:URL_ENCODED_PASSWORD@HOST:3306/DBNAME
      # Semicolons in password must be %3B
      - key: DATABASE_URL
        sync: false   # set this in Render dashboard → Environment

      # ── SambaNova (REQUIRED — primary NL2SQL) ───────────────────
      # Comma-separated list, rotated on 429
      - key: SAMBANOVA_API_KEYS
        sync: false

      # ── Gemini (recommended fallback) ───────────────────────────
      - key: GEMINI_API_KEYS
        sync: false

      # ── Groq (optional — last-resort fallback) ──────────────────
      - key: GROQ_API_KEY_1
        sync: false

      - key: GROQ_API_KEY_2
        sync: false
