services:
  - type: web
    name: mewar-erp-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker --timeout 120 -b 0.0.0.0:$PORT app.main:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

      # ── CORS: set to * so any frontend/client can call the API ──
      - key: CORS_ORIGINS
        value: "*"

      # ── App environment ─────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      # ── Database (optional — falls back to hardcoded in code) ───
      # Uncomment in Render dashboard if you want to override the
      # default Hostinger DB hardcoded in app/db/database.py
      - key: DATABASE_URL
        sync: false   # set in Render dashboard → Environment (optional)

      # ── LLM keys (optional — code has hardcoded fallbacks) ──────
      # SambaNova is the primary provider, Gemini and Groq are fallbacks.
      # Code has hardcoded keys; these env vars override them if set.
      - key: SAMBANOVA_API_KEY
        sync: false   # optional

      - key: GEMINI_API_KEY
        sync: false   # optional

      - key: GROQ_API_KEY_1
        sync: false   # optional

      - key: GROQ_API_KEY_2
        sync: false   # optional
